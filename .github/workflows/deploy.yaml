name: Build & Deploy to Nexus

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: simple-node-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to Nexus
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.NEXUS_REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.NEXUS_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.NEXUS_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY: ${{ secrets.NEXUS_REGISTRY }}
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
          IMAGE: ${{ secrets.NEXUS_REGISTRY }}/${{ env.IMAGE_NAME }}:${{
            needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: REGISTRY,NEXUS_USER,NEXUS_PASS,IMAGE
          script: |
            set -e
            echo "$NEXUS_PASS" | docker login "$REGISTRY" -u "$NEXUS_USER" --password-stdin
            docker pull "$IMAGE"
            docker stop node-app 2>/dev/null || true
            docker rm node-app 2>/dev/null || true
            docker run -d --name node-app --restart unless-stopped -p 80:3000 "$IMAGE"
            docker image prune -f
            docker logout "$REGISTRY"
            sleep 3
            curl -fsS http://localhost/api/health || (echo "Health check failed" && exit 1)
